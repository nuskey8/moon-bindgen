name: Test and lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Test and lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install MoonBit toolchain
        uses: hustcer/setup-moonbit@v1.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Configure libclang on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Check generated MoonBit bindings
        working-directory: sandbox
        run: moon check --target native

      - name: Run MoonBit FFI tests
        working-directory: sandbox
        run: moon test --target native
